services:
  postgres:
    image: postgres:16-alpine
    container_name: scale-admin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scale_admin}
      POSTGRES_USER: ${POSTGRES_USER:-scale_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — copy .env.example to .env and populate it before running compose}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      args:
        BUILD_SHA: ${BUILD_SHA:-dev}
        BUILT_AT: ${BUILT_AT:-dev}
    container_name: scale-admin-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required — copy .env.example to .env and populate it before running compose}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-disabled}
      EMAIL_FROM: ${EMAIL_FROM:-}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-scale_admin_session}
      SESSION_IDLE_TIMEOUT_MINUTES: ${SESSION_IDLE_TIMEOUT_MINUTES:-30}
      SESSION_ABSOLUTE_TIMEOUT_DAYS: ${SESSION_ABSOLUTE_TIMEOUT_DAYS:-14}
      CSRF_COOKIE_NAME: ${CSRF_COOKIE_NAME:-scale_admin_csrf}
      CSRF_HEADER_NAME: ${CSRF_HEADER_NAME:-x-csrf-token}
      AUTH_RATE_LIMIT_WINDOW_SECONDS: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:-60}
      AUTH_LOGIN_RATE_LIMIT_MAX: ${AUTH_LOGIN_RATE_LIMIT_MAX:-5}
      AUTH_ACTION_RATE_LIMIT_MAX: ${AUTH_ACTION_RATE_LIMIT_MAX:-10}
      AUTH_FAILED_LOGIN_MAX_ATTEMPTS: ${AUTH_FAILED_LOGIN_MAX_ATTEMPTS:-5}
      AUTH_FAILED_LOGIN_LOCK_MINUTES: ${AUTH_FAILED_LOGIN_LOCK_MINUTES:-15}
      PASSWORD_RESET_TOKEN_TTL_MINUTES: ${PASSWORD_RESET_TOKEN_TTL_MINUTES:-60}
      FILE_UPLOAD_DIR: ${FILE_UPLOAD_DIR:-/app/uploads}
    ports:
      - "3000:3000"
    volumes:
      - scale_admin_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL-}
    container_name: scale-admin-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL-}
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  scale_admin_uploads:
